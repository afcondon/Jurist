package:
  name: catlab-schema
  description: >
    Tier-3 (Catlab / ACSets): a typed multi-sort schema (Module / Func / Call) and
    architectural motifs found by homomorphism search over it — a typed schema
    language for graph-shaped data. Self-contained purejl workspace, own Catlab
    julia-env.
  dependencies:
    - prelude
    - effect
    - console
    - arrays
    - maybe
    - tuples
    - strings
    - foldable-traversable
workspace:
  packageSet:
    registry: 57.1.0
  backend:
    cmd: "true"
