resolver: lts-23.18
system-ghc: true
install-ghc: false
skip-ghc-check: true
pvp-bounds: both
packages:
  - .
ghc-options:
  "$locals": -O2
extra-deps:
  - github: purescript/purescript
    commit: v0.15.16
  - language-javascript-0.7.0.0
  - bower-json-1.1.0.0
  - these-1.2.1
  - aeson-better-errors-0.9.1.3
  - github: purescript/cheapskate
    commit: 633c69024e061ad956f1aecfc137fb99a7a7a20b

flags:
  aeson-pretty:
    lib-only: true
