package:
  name: catlab-migration
  description: >
    Tier-3 (Catlab / ACSets): functorial data migration. A Δ migration aggregates
    a function-level call graph up to a module dependency graph along the in_mod
    functor — the other ACSet superpower, producing a plain graph ready to lay
    out and draw.
    Self-contained purejl workspace, own Catlab julia-env.
  dependencies:
    - answer
    - migration-core
    - prelude
    - effect
    - console
    - arrays
    - maybe
    - tuples
    - strings
    - foldable-traversable
workspace:
  extraPackages:
    answer:
      path: ../answer
  packageSet:
    registry: 57.1.0
  backend:
    cmd: "true"
