<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Stability Atlas — PureScript on Julia</title>
<link rel="icon" href="data:,">
<style>
  :root {
    --paper: #fbfaf7;
    --ink: #14213d;
    --accent: #c1542c;
    --rule: #d8d4ca;
    --muted: #6e6a60;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Helvetica Neue", Helvetica, Inter, Arial, sans-serif;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }
  .atlas { max-width: 860px; margin: 0 auto; padding: 48px 24px 96px; }
  header h1 {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
  }
  .thesis {
    font-size: 15px;
    line-height: 1.55;
    color: var(--muted);
    max-width: 64ch;
    margin: 0 0 32px;
  }
  .controls {
    display: flex;
    align-items: baseline;
    gap: 20px;
    padding: 12px 0;
    border-top: 2px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 28px;
    font-size: 13px;
  }
  .controls label { color: var(--ink); }
  .controls select, .controls button {
    font: inherit;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    padding: 2px 8px;
  }
  .controls button { cursor: pointer; }
  .controls button:hover { background: var(--ink); color: var(--paper); }
  .status { color: var(--accent); margin-left: auto; }
  .plot { position: relative; padding-left: 56px; }
  .resonance-rail {
    position: relative;
    height: 20px;
    margin-left: 0;
    width: 720px;
  }
  .resonance-rail .mark {
    position: absolute;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--accent);
    border-left: 1px solid var(--accent);
    padding-left: 3px;
    height: 20px;
  }
  canvas { display: block; background: #eceae3; }
  .x-axis {
    display: flex;
    justify-content: space-between;
    width: 720px;
    font-size: 11px;
    color: var(--muted);
    padding-top: 6px;
  }
  .y-axis {
    position: absolute;
    left: 0;
    top: 20px;
    height: 450px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    width: 48px;
    text-align: right;
  }
  .y-axis span:nth-child(2) { writing-mode: vertical-rl; transform: rotate(180deg); align-self: center; }
  .selection { font-size: 13px; color: var(--muted); margin-top: 20px; }
  .orrery { margin-top: 36px; }
  .orrery-head {
    display: flex;
    align-items: baseline;
    gap: 20px;
    border-top: 2px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    padding: 10px 0;
    margin-bottom: 20px;
  }
  .orrery-head h2 { font-size: 20px; margin: 0; letter-spacing: -0.01em; }
  .orrery-head button {
    font: inherit; font-size: 12px;
    border: 1px solid var(--ink);
    background: transparent; color: var(--ink);
    padding: 2px 8px; cursor: pointer;
  }
  .orrery-head button:hover { background: var(--ink); color: var(--paper); }
  .orrery-head .drift { font-size: 12px; color: var(--muted); margin-left: auto; }
</style>
</head>
<body>
<script type="module" src="./index.js"></script>
</body>
</html>
