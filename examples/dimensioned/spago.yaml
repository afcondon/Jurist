package:
  name: dimensioned
  description: >
    The Julia denotation of the typed Quantity language (core/): the
    type-level dimension exponents reflect to plain values and cross the seam
    once; DynamicQuantities renders the quantity in SI, converts units on
    request, and re-checks at runtime what the PureScript types already
    proved at compile time. Self-contained purejl workspace with its own
    (DynamicQuantities-only) julia-env.
  dependencies:
    - prelude
    - effect
    - console
    - numbers
    - quantity-core
    - strings
workspace:
  packageSet:
    registry: 57.1.0
  backend:
    cmd: "true"
