package:
  name: numexpr-node
  description: >
    The Node/JS denotation of the Tier-2 eDSL. Depends only on numexpr-core and
    runs SystemSpec.integratePure — the pure-PureScript RK4, no FFI — on the
    default JavaScript backend, proving the core description is genuinely
    backend-agnostic. Cross-checks the Lorenz orbit's maxZ against the Julia
    native RK4 reference (ADR-0007, "one description, many denotations").
  dependencies:
    - prelude
    - effect
    - console
    - arrays
    - foldable-traversable
    - maybe
    - numbers
    - numexpr-core
workspace:
  extraPackages:
    numexpr-core:
      path: ../core
  packageSet:
    registry: 57.1.0
